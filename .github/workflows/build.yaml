name: Build "GeoGaga - Server Flavor"

on:
  schedule:
    - cron: '55 2 * * *' # Ежедневно в 5:55 GMT+3 (2:55 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install grpcio-tools requests

      - name: Execute Build Script
        run: python build.py

      - name: Generate SHA256 Hashes
        run: |
          sha256sum geoip.dat > geoip.dat.sha256
          sha256sum geosite.dat > geosite.dat.sha256

      - name: Push to Release Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir -p /tmp/out
          cp geoip.dat geosite.dat *.sha256 /tmp/out/
          
          git clean -fd
          git fetch origin release || true
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout -f release
            git pull origin release
          else
            git checkout --orphan release
            git rm -rf .
          fi
          
          cp /tmp/out/* .
          git add geoip.dat geosite.dat *.sha256
          git commit -m "Automated build $(date +%Y%m%d)" || echo "No changes to commit"
          git push origin release --force

      - name: Create or Overwrite GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          sleep 2
          gh release create latest geoip.dat geosite.dat *.sha256 --title "$(date +%Y%m%d)" --notes "Daily automated geo-data update (Flavor 2)"
