name: Build GeoData

on:
  schedule:
    - cron: '55 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Protoc & Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          pip install protobuf

      - name: Compile Protobuf Schema
        run: protoc --python_out=. router.proto

      - name: Run Builder
        run: python builder.py config.json

      - name: Generate SHA256 Hashes
        run: |
          sha256sum geosite.dat > geosite.dat.sha256
          sha256sum geoip.dat > geoip.dat.sha256

      - name: Commit to Release Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B release
          git add *.dat *.sha256
          git commit -m "Auto-update GeoData" || echo "No changes to commit"
          git push origin release --force

      - name: Delete old latest tag/release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag -y || true

      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ${{ steps.date.outputs.date }}
          files: |
            geosite.dat
            geosite.dat.sha256
            geoip.dat
            geoip.dat.sha256
          prerelease: false
          make_latest: true
