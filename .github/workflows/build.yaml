name: Build "GeoGaga - Server Flavor"

on:
  schedule:
    - cron: '55 2 * * *' # Каждый день в 5:55 GMT+3
  workflow_dispatch: # Возможность ручного запуска

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Protobuf Compiler and Tools
        run: |
          python -m pip install --upgrade pip
          pip install grpcio-tools requests

      - name: Execute Server Build Script
        run: python build_server.py

      - name: Generate SHA256 hashes
        run: |
          sha256sum geoip.dat > geoip.dat.sha256
          sha256sum geosite.dat > geosite.dat.sha256

      - name: Commit to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/server_out
          cp geoip.dat geosite.dat *.sha256 /tmp/server_out/

          git clean -fd

          git fetch origin release || true
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout -f release
            git pull origin release
          else
            git checkout --orphan release
            git rm -rf .
          fi

          cp /tmp/server_out/* .
          git add geoip.dat geosite.dat *.sha256
          git commit -m "Automated server build $(date +%Y%m%d)" || echo "No changes to commit"
          git push origin release --force

      - name: Create or Overwrite GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TITLE=$(date +%Y%m%d)
          
          if gh release view latest >/dev/null 2>&1; then
            echo "Release 'latest' exists. Updating title to $RELEASE_TITLE and replacing assets..."
            gh release edit latest --title "$RELEASE_TITLE"
            gh release upload latest geoip.dat geosite.dat *.sha256 --clobber
          else
            echo "Release 'latest' does not exist. Creating a new one..."
            gh release create latest geoip.dat geosite.dat *.sha256 --title "$RELEASE_TITLE" --notes "Daily automated server geo-data update"
          fi
