<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" style="background:#0d1117; border-radius: 12px; user-select: none;">
  <style>
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    @keyframes colon-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    /* Базовые анимации изменения прозрачности для разных типов частиц */
    @keyframes smoke-glow-bright { 0%, 100% { fill-opacity: 0.95; } 50% { fill-opacity: 0.35; } }
    @keyframes smoke-glow-medium { 0%, 100% { fill-opacity: 0.70; } 50% { fill-opacity: 0.20; } }
    @keyframes smoke-glow-soft { 0%, 100% { fill-opacity: 0.45; } 50% { fill-opacity: 0.05; } }
    @keyframes spark-twinkle { 0%, 100% { fill-opacity: 0.85; opacity: 1; } 50% { fill-opacity: 0.10; opacity: 0.2; } }

    .lamp-green { animation: blink 0.8s infinite; }
    .colon { animation: colon-blink 1s infinite; }
    .cursor-blink { animation: cursor-blink 1.2s infinite; }
    
    /* Назначаем анимации и используем инлайн-задержки animation-delay для хаоса */
    .p-b { animation: smoke-glow-bright 2.8s infinite ease-in-out; }
    .p-m { animation: smoke-glow-medium 3.2s infinite ease-in-out; }
    .p-s { animation: smoke-glow-soft 4s infinite ease-in-out; }
    .p-tw { animation: spark-twinkle 1.5s infinite ease-in-out; }
  </style>

